name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Type Check
        run: bunx --bun tsc --noEmit
      - name: Lint
        run: bunx --bun @biomejs/biome check src/ tests/
      - name: Test
        run: bun run test:ci
